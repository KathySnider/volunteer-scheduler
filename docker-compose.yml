# ============================================
# docker-compose.yml
# Full Stack Volunteer Scheduler
# ============================================
#
# Secret files required (plain text, one value per file):
#   secret_postgres_pw.txt    — PostgreSQL password
#   secret_db_url.txt         — DB connection URL ("database_password" is the placeholder)
#   secret_resend_api_key.txt — Resend API key (required when USE_RESEND=true)
#
# Note: postgres_password and secret_db_pw reference the same file.
# The db service and api service use different secret names by convention.
# ============================================

services:

  # PostgreSQL Database
  db:
    build: ./database
    container_name: volunteer-scheduler
    environment:
      POSTGRES_DB: volunteer-scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "5433:5432"
    volumes:
      - volunteer-scheduler-data:/var/lib/postgresql/data
    networks:
      - volunteer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go GraphQL API
  api:
    build: ./backend
    container_name: volunteer-api
    environment:
      MIGRATIONS_PATH: file:///app/migrations
      DB_NAME: volunteer-scheduler
      APP_ENV: ${APP_ENV:-development}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      MAGIC_LINK_CALLBACK_PATH: ${MAGIC_LINK_CALLBACK_PATH:-/auth/magic-link}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-2592000}
      MAIL_FROM: ${MAIL_FROM:-noreply@volunteer-scheduler.local}
      USE_RESEND: ${USE_RESEND:-false}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-mailhog}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-1025}
    secrets:
      - secret_db_pw
      - secret_db_url
      - secret_resend_api_key
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - volunteer-network
    restart: unless-stopped
    healthcheck:
      # /auth serves the GraphQL playground and reliably returns 200 for GET requests.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_GRAPHQL_AUTH_URL: ${NEXT_PUBLIC_GRAPHQL_AUTH_URL:-http://localhost:8080/graphql/auth}
        NEXT_PUBLIC_GRAPHQL_VOLUNTEER_URL: ${NEXT_PUBLIC_GRAPHQL_VOLUNTEER_URL:-http://localhost:8080/graphql/volunteer}
        NEXT_PUBLIC_GRAPHQL_ADMIN_URL: ${NEXT_PUBLIC_GRAPHQL_ADMIN_URL:-http://localhost:8080/graphql/admin}
    container_name: volunteer-frontend
    environment:
      NEXT_PUBLIC_GRAPHQL_AUTH_URL: ${NEXT_PUBLIC_GRAPHQL_AUTH_URL:-http://localhost:8080/graphql/auth}
      NEXT_PUBLIC_GRAPHQL_VOLUNTEER_URL: ${NEXT_PUBLIC_GRAPHQL_VOLUNTEER_URL:-http://localhost:8080/graphql/volunteer}
      NEXT_PUBLIC_GRAPHQL_ADMIN_URL: ${NEXT_PUBLIC_GRAPHQL_ADMIN_URL:-http://localhost:8080/graphql/admin}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - volunteer-network
    restart: unless-stopped

  # Mailhog — local email testing only
  mailhog:
    image: mailhog/mailhog
    container_name: volunteer-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - volunteer-network
    restart: unless-stopped

networks:
  volunteer-network:
    driver: bridge

secrets:
  postgres_password:
    file: ./secret_postgres_pw.txt
  secret_db_pw:
    file: ./secret_postgres_pw.txt
  secret_db_url:
    file: ./secret_db_url.txt
  secret_resend_api_key:
    file: ./secret_resend_api_key.txt

volumes:
  volunteer-scheduler-data:
    driver: local
