## Types common to all of the schemas.

#-- Scalers --

scalar Upload

#-- ENUMS --
enum Role {
  VOLUNTEER
  ADMINISTRATOR
}

enum EventType {
  VIRTUAL
  IN_PERSON
  HYBRID
}

enum FeedbackType {
    BUG
    ENHANCEMENT
    GENERAL
}

enum FeedbackStatus {
  OPEN
  QUESTION_SENT
  RESOLVED_GITHUB
  RESOLVED_REJECTED
}

enum FeedbackNoteType {
  ADMIN_NOTE
  QUESTION
  VOLUNTEER_REPLY
  EMAIL_TO_VOLUNTEER
}

enum ShiftTimeFilter {
  UPCOMING
  PAST
  ALL
}

#-- Input --

## The EventFilter reflects all of the fields on which 
## a user can filter the results. If you want to add
## more ways to filter, this is the place.
input EventFilterInput {
  regions: [Int!]
  eventType: EventType
  jobs: [Int!]
  shiftStartDateTime: String
  shiftEndDateTime: String
  ianaZone: String
}

input NewFeedbackInput {
  type: FeedbackType!
  subject: String!
  app_page_name: String!
  text: String!
}

#-- Output --

type Region {
  id: Int!
  code: String!
  name: String!
  isActive: Boolean!
}

type ServiceType{
  id: Int!
  code: String!
  name: String!
}
  
type JobType{
  id: Int!
  code: String!
  name: String!
  sortOrder: Int!
  isActive: Boolean!
}
  
type LookupValues{
  regions: [Region!]!
  serviceTypes: [ServiceType!]!
  jobTypes: [JobType!]!
}

type VolunteerProfile {
  firstName: String!
  lastName: String!
  email: String!
  phone: String
  zipCode: String
  role: Role!
}

type VolunteerShift {
  shiftId: ID!
  assignedAt: String!
  cancelledAt: String
  startDateTime: String!
  endDateTime: String!
  maxVolunteers: Int
  jobName: String!
  isVirtual: Boolean!
  preEventInstructions: String
  eventId: ID!
  eventName: String!
  eventDescription: String
  venue: Venue
}

type Venue {
  id: ID!
  name: String
  address: String!
  city: String!
  state: String!
  zipCode: String
  timezone: String!
  region: [Int!]!
}

type Event {
  id: ID!
  name: String!
  description: String
  eventType: EventType!
  venue: Venue
  serviceTypes: [String!]
  eventDates: [EventDate!]!
  shiftSummaries: [EventShiftSummary!]!
}

# Per-opportunity volunteer counts for the event listing cards.
type EventShiftSummary {
  jobName: String!
  assignedVolunteers: Int!
  maxVolunteers: Int!
}

type EventDate {
  id: ID!
  startDateTime: String!
  endDateTime: String!
}

type FeedbackAttachment {
  id: ID!
  filename: String!
  mimeType: String!
  fileSize: Int!
  createdAt: String!
}

type AttachmentDownload {
  filename: String!
  mimeType: String!
  data: String!
}


#-- Results --
type MutationResult {
  success: Boolean!
  message: String
  id: ID
}
