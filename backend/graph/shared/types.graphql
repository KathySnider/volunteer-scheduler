## Types common to all of the schemas.

type Query {
  lookupValues: LookupValues!
}

type Mutation {
  # Feedback
  attachFileToFeedback(feedbackId: ID!, file: Upload!): MutationResult!
  giveFeedback (feedback: NewFeedbackInput!): MutationResult!
}


#-- Scalers --

scalar Upload

#-- ENUMS --

enum Role {
  VOLUNTEER
  ADMINISTRATOR
}

enum EventType {
  VIRTUAL
  IN_PERSON
  HYBRID
}

enum FeedbackType {
    BUG
    ENHANCEMENT
    GENERAL
}

enum FeedbackStatus {
  OPEN
  QUESTION_SENT
  RESOLVED_IMPLEMENTED
  RESOLVED_REJECTED
}

enum FeedbackNoteType {
  ADMIN_NOTE
  QUESTION
  VOLUNTEER_NOTE
  EMAIL_TO_VOLUNTEER
}

enum ShiftTimeFilter {
  UPCOMING
  PAST
  ALL
}

#-- Output --

# Lookup values 

type ServiceType{
  id: Int!
  code: String!
  name: String!
}
  
type JobType{
  id: Int!
  code: String!
  name: String!
  sortOrder: Int!
  isActive: Boolean!
}
  
type LookupValues{
  serviceTypes: [ServiceType!]!
  jobTypes: [JobType!]!
  cities: [String!]!
}


# Events 

# Per-opportunity volunteer counts for the event listing cards.
# Used on volunteer pages, and on manage events pages.

type EventShiftSummary {
  jobName: String!
  assignedVolunteers: Int!
  maxVolunteers: Int!
}

# Feedback 

# Both Feedback and FeedbackView (volunteers) use the same 
# metadata. When the content of an attachment is viewed,
# there is a different type.

type FeedbackMetaAttachment {
  id: ID!
  filename: String!
  mimeType: String!
  fileSize: Int!
  createdAt: String!
}

#-- Results --

type MutationResult {
  success: Boolean!
  message: String
  id: ID
}

#-- Input --

# Feedback

input NewFeedbackInput {
  type: FeedbackType!
  subject: String!
  app_page_name: String!
  text: String!
}


