## Types common to all of the schemas.


#-- ENUMS --
enum Role {
  VOLUNTEER
  ADMINISTRATOR
}

enum EventType {
  VIRTUAL
  IN_PERSON
  HYBRID
}

enum FeedbackType {
    BUG
    ENHANCEMENT
    GENERAL
}

enum FeedbackStatus {
  OPEN
  QUESTION_SENT
  RESOLVED_GITHUB
  RESOLVED_REJECTED
}

enum ShiftTimeFilter {
  UPCOMING
  PAST
  ALL
}

#-- Input --

## The EventFilter reflects all of the fields on which 
## a user can filter the results. If you want to add
## more ways to filter, this is the place.
input EventFilterInput {
  regions: [Int!]
  eventType: EventType
  jobs: [Int!]
  shiftStartDateTime: String
  shiftEndDateTime: String
  ianaZone: String
}

input NewFeedbackInput {
  type: FeedbackType!
  subject: String!
  app_page_name: String!
  text: String!
}

#-- Output --

type Region {
  id: Int!
  code: String!
  name: String!
  isActive: Boolean!
}

type ServiceType{
  id: Int!
  code: String!
  name: String!
  isActive: Boolean!
}
  
type JobType{
  id: Int!
  code: String!
  name: String!
  isActive: Boolean!
}
  
type LookupValues{
  regions: [Region!]!
  serviceTypes: [ServiceType!]!
  jobTypes: [JobType!]!
}

type VolunteerProfile {
  firstName: String!
  lastName: String!
  email: String!
  phone: String
  zipCode: String
  role: Role!
}

type VolunteerShift {
  shiftId: ID!
  assignedAt: String!
  cancelledAt: String
  startDateTime: String!
  endDateTime: String!
  maxVolunteers: Int
  jobName: String!
  isVirtual: Boolean!
  preEventInstructions: String
  eventId: ID!
  eventName: String!
  eventDescription: String
  venue: Venue
}

type Venue {
  id: ID!
  name: String
  address: String!
  city: String!
  state: String!
  zipCode: String
  timezone: String!
  region: [Int!]!
}

type Event {
  id: ID!
  name: String!
  description: String
  eventType: EventType!
  venue: Venue
  serviceTypes: [String!]
  eventDates: [EventDate!]!  
}

type EventDate {
  id: ID!
  startDateTime: String!
  endDateTime: String!
}



#-- Results --
type MutationResult {
  success: Boolean!
  message: String
  id: ID
}
