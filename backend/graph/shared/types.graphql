## Types common to all of the schemas.


#-- ENUMS --
enum EventType {
  VIRTUAL
  IN_PERSON
  HYBRID
}

# ServiceType describes the category(s) of service
# into which this event falls.
enum ServiceType {
  OUTREACH
  ADVOCACY
  SPEAKERS_BUREAU
  OFFICE_SUPPORT
  OTHER
}

# Job describes the specific job for which a VolunteerProfile
# is needed.
enum Job {
  EVENT_SUPPORT
  ADVOCACY
  SPEAKER
  VOLUNTEER_LEAD
  ATTENDEE_ONLY
  OTHER
}

#-- Input --


## The EventFilter reflects all of the fields on which 
## a user can filter the results. If you want to add
## more ways to filter, this is the place.
input EventFilterInput {
  cities: [String!]
  eventType: EventType
  jobs: [Job!]
  shiftStartDateTime: String
  shiftEndDateTime: String
  ianaZone: String
}

# TODO: make sure to get rid of ID from VolunteerProfile
# once we have tokens!

#-- Output --

type VolunteerProfile {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  phone: String
  zipCode: String
}

type Venue {
  id: ID!
  name: String
  address: String!
  city: String!
  state: String!
  zipCode: String
  timezone: String!
}

type Event {
  id: ID!
  name: String!
  description: String
  eventType: EventType!
  venue: Venue
  serviceTypes: [ServiceType!]
  eventDates: [EventDate!]!  
}

type EventDate {
  id: ID!
  startDateTime: String!
  endDateTime: String!
}



#-- Results --
type MutationResult {
  success: Boolean!
  message: String
  id: ID
}
